<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 안전점검 보고서</title>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .search-box {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .result-count {
            font-weight: bold;
            color: #0056b3;
            font-size: 1.1em;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }
        .card h2 {
            margin-top: 0;
            color: #34495e;
            font-size: 1.3em;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .card p {
            line-height: 1.6;
            white-space: pre-wrap; /* \n 줄바꿈 기호를 화면에 렌더링 */
            margin-bottom: 0;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2026 안전점검 보고서</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="검색어를 입력하세요 (제목, 본문 검색)">
            <div class="result-count" id="resultCount">검색 결과: 0건</div>
        </div>
        <div id="cardContainer"></div>
    </div>

    <script>
        let reportData = [];

        // 1. 장데이터.json을 불러오는 함수
        async function loadData() {
            try {
                // 웹 서버(HTTP) 환경에서는 장데이터.json을 정상적으로 불러옵니다.
                const response = await fetch('장데이터.json');
                if (!response.ok) throw new Error('Network response was not ok');
                reportData = await response.json();
            } catch (error) {
                // 로컬에서 직접 파일을 열었을 때 fetch 에러가 발생하면, 아래 제공된 예비 데이터를 사용합니다.
                console.log('장데이터.json을 불러오지 못해 내장된 데이터를 사용합니다.', error);
                reportData = [
                    {
                        "장": "1",
                        "제목": "개요",
                        "본문": "본 보고서는 행정안전부 안전정책총괄과가 2026년 상반기 실시한 종합 안전점검 결과를 정리한 자료다.\n\n총 점검 건수는 **450건**이며, 지적사항 **120건** 중 시정 완료율은 **85%**이다. 예산 집행률은 **92%**, 총괄책임자는 **권혁수** 안전정책총괄과장이다."
                    },
                    {
                        "장": "2",
                        "제목": "분야별 결과",
                        "본문": "분야별 점검은 시설안전·교통안전·재난안전·산업안전 4개 분야로 진행됐다. 분야별 총합은 **450건**과 일치한다.\n\n지적사항 **115건** 중 80% 이상이 1분기 내 시정되었으며, 누적 시정 완료율은 **85%**으로 집계됐다. <!-- 모순: 지적사항 오답값 -->"
                    },
                    {
                        "장": "3",
                        "제목": "예산 운용",
                        "본문": "상반기 예산 집행률 **90%**은 전년 동기 대비 5%p 상승한 수치다. <!-- 모순: 예산집행률 오답값 -->\n\n총괄 운영은 **권혁수** 과장이 직접 주재했고, 분기별 점검회의 5회를 개최했다."
                    },
                    {
                        "장": "4",
                        "제목": "향후 계획",
                        "본문": "하반기에는 추가 점검 **440건**을 목표로 추진한다. <!-- 모순: 총점검건수 오답값 -->\n\n상반기 시정 완료율 **82%** 수준에 머문 일부 지자체는 추가 컨설팅 대상으로 지정한다. <!-- 모순: 시정완료율 오답값 -->"
                    },
                    {
                        "장": "5",
                        "제목": "결론",
                        "본문": "행정안전부 안전정책총괄과는 2026년 상반기 동안 **450건**의 안전점검을 차질 없이 완료했다. 총괄 책임은 **권혁주** 과장이 맡았으며, 향후에도 분기별 점검 체계를 강화한다. <!-- 모순: 총괄책임자 오답값 -->"
                    }
                ];
            }
            renderCards(reportData); // 초기 5장 렌더링
        }

        // 카드를 화면에 그려주는 함수
        function renderCards(data) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            
            // 3. 결과 수 표시
            document.getElementById('resultCount').textContent = `검색 결과: ${data.length}건`;

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';

                const title = document.createElement('h2');
                title.textContent = `제${item.장}장. ${item.제목}`;

                const content = document.createElement('p');
                // textContent를 사용하여 HTML 주석(<!-- -->) 및 특수문자 안전하게 렌더링
                content.textContent = item.본문;

                card.appendChild(title);
                card.appendChild(content);
                container.appendChild(card);
            });
        }

        // 2. 검색창 키워드 입력 시 본문/제목 매칭 카드만 필터
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filteredData = reportData.filter(item =>
                item.제목.toLowerCase().includes(keyword) ||
                item.본문.toLowerCase().includes(keyword)
            );
            renderCards(filteredData);
        });

        // 페이지 로드 시 데이터 호출
        loadData();
    </script>
</body>
</html>
